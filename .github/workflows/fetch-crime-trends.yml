name: Fetch Crime Trends Data

on:
  # Police workforce data published annually in July; CSEW in January.
  # Run in August to pick up the latest police headcount.
  schedule:
    - cron: '0 10 1-7 8 5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Fetch crime trends data
        run: node scripts/fetch-crime-trends.js

      - name: Validate data
        run: node scripts/validate.js

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'data: update crime trends figures [automated]'
          file_pattern: 'data/crime-trends.json'
          commit_author: 'github-actions[bot] <github-actions[bot]@users.noreply.github.com>'
