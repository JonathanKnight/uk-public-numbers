name: Fetch GP Workforce Data

on:
  # September GP workforce data is published in October each year.
  # Run on the first Friday of November to be safe.
  schedule:
    - cron: '0 10 1-7 11 5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Fetch GP workforce data
        run: node scripts/fetch-gp-workforce.js

      - name: Validate data
        run: node scripts/validate.js

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'data: update GP workforce figures [automated]'
          file_pattern: 'data/nhs.json'
          commit_author: 'github-actions[bot] <github-actions[bot]@users.noreply.github.com>'
