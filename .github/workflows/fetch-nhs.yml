name: Fetch NHS Data

on:
  # NHS England publishes A&E stats monthly, typically the second Thursday.
  # Run the Friday after the second Thursday (day-of-month 8–14, Friday = 5).
  schedule:
    - cron: '0 10 8-14 * 5'
  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Fetch NHS data
        run: node scripts/fetch-nhs.js

      - name: Validate data
        run: node scripts/validate.js

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'data: update NHS figures [automated]'
          file_pattern: 'data/nhs.json'
          commit_author: 'github-actions[bot] <github-actions[bot]@users.noreply.github.com>'
